name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Turbo remote cache — set TURBO_TOKEN and TURBO_TEAM in GitHub Secrets for ~80% faster CI
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: false

jobs:
  # ── 1. Lint & Typecheck ──────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

  # ── 2. Unit Tests ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Create Neon branch for PR
        if: github.event_name == 'pull_request'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_NAME: pr-${{ github.event.number }}
        run: |
          npx -y neonctl --api-key "$NEON_API_KEY" branches create --project-id "$NEON_PROJECT_ID" --name "$BRANCH_NAME" --output json

          DATABASE_URL=$(npx -y neonctl --api-key "$NEON_API_KEY" connection-string "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --pooled)
          DIRECT_URL=$(npx -y neonctl --api-key "$NEON_API_KEY" connection-string "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --prisma)

          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          echo "DIRECT_URL=$DIRECT_URL" >> "$GITHUB_ENV"

      - name: Use repository database secrets on push
        if: github.event_name != 'pull_request'
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> "$GITHUB_ENV"
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm turbo test

  # ── 3. Build ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and apps
        run: pnpm turbo build

  # ── 4. Migrate + Deploy API → Railway ────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run Prisma migrations before deploying the new API version.
      # Uses DIRECT_URL (non-pooled) which is required for schema migrations.
      - name: Run database migrations
        run: pnpm --filter @devtrack/database exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service devtrack-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
